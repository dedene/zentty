name: Zentty
options:
  bundleIdPrefix: com.peterdedene
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    PRODUCT_NAME: Zentty
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    GENERATE_INFOPLIST_FILE: NO
    CLANG_ENABLE_MODULES: YES
    CODE_SIGN_STYLE: Automatic
schemes:
  Zentty:
    build:
      targets:
        Zentty: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ZenttyTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
targets:
  Zentty:
    type: application
    platform: macOS
    sources:
      - path: Zentty
    dependencies:
      - framework: FrameworksLocal/GhosttyKit.xcframework
        embed: false
    info:
      path: Zentty/Info.plist
      properties:
        CFBundleIconFile: AppIcon
    preBuildScripts:
      - name: Verify GhosttyKit
        script: |
          FRAMEWORK_PATH="${PROJECT_DIR}/FrameworksLocal/GhosttyKit.xcframework"
          if [ ! -d "$FRAMEWORK_PATH" ]; then
            echo "error: GhosttyKit.xcframework not found. Run scripts/build_ghosttykit.sh first."
            exit 1
          fi
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peterdedene.zentty
        INFOPLIST_FILE: Zentty/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        OTHER_LDFLAGS:
          - -lc++
          - -framework
          - Metal
          - -framework
          - QuartzCore
          - -framework
          - IOSurface
          - -framework
          - UniformTypeIdentifiers
          - -framework
          - Carbon
  ZenttyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ZenttyTests
    info:
      path: ZenttyTests/Info.plist
    settings:
      base:
        PRODUCT_NAME: ZenttyTests
        PRODUCT_BUNDLE_IDENTIFIER: com.peterdedene.zenttyTests
        INFOPLIST_FILE: ZenttyTests/Info.plist
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Zentty.app/Contents/MacOS/Zentty"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Zentty
